        <form action="#" class="form">
          <div class="form-pre">

              <div class="input-heading">Your name</div>
              <input type="text" placeholder="John Doe">
            </div>
            <div class="input">
              <div class="input-heading">Your mail</div>
              <input type="text" placeholder="johndoe@gmail.com">
            </div>
          </div>
          <div class="form-pre">
            <div class="input">
              <div class="input-heading">Query type</div>
              <select class="select" name="query" id="query">
                <option value="0">Contact</option>
                <option value="1">Report</option>
                <option value="2">Help</option>
              </select>
            </div>
            <!-- <div class="input">
              <div class="input-heading">Your name</div>
              <input type="text" placeholder="John Doe">
            </div> -->
          </div>
          <div class="message">
            <div class="input-heading">Message</div>
            <textarea name="message" id="message" placeholder="Let us know about you query..." rows="10"></textarea>
          </div>
        </form>
      </div>
      <div class="main-bottom">
        <button class="submit">Just Send <i class="fa-solid fa-arrow-right"></i></button>
      </div>
