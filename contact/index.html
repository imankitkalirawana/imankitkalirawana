<body>
  <div class="container">
    <header>
      <div class="head">
        <div class="head_left">

          <div class="head_left_logo">imankit<span class="head_left_logo-2">kalirawana</span></div>
        </div>
        <div class="head_right">
          <div class="head_right_menu-btn" id="head_right_menu-btn" onclick="dropdown_head()"><i id="xmark"
              class="fa-regular fa-ellipsis-vertical"></i></div>
          <div class="head_dropdown" id="head_dropdown">
            <div class="head_dropdown-1">
              <a href="#" class="head_dropdown_item"><span class="head_dropdown_item-title"><i
                    class="fa-light fa-user-lock"></i>Your data in imankitkalirawana</span></a>

            <hr>
            <div class="head_dropdown-2">
              <a href="#" class="head_dropdown_item"><span class="head_dropdown_item-title"><i
                    class="fa-light fa-gear"></i>Settings</span><i class="fa-light fa-angle-right"></i></a>
              <label class="theme-switch head_dropdown_item" for="checkbox">
                <span class="head_dropdown_item-title"><i class="fa-light fa-eclipse"></i>Appearance:
                  <span id="appearance">Dark theme</span>

                <input type="checkbox" class="checkbox" id="checkbox" />

              </label>

                    class="fa-light fa-globe"></i>Location: India</span><i class="fa-light fa-angle-right"></i></a>
            </div>

              <a href="#" class="head_dropdown_item"><span class="head_dropdown_item-title"><i
                    class="fa-light fa-circle-question"></i>Help</span></a>
              <a href="#" class="head_dropdown_item"><span class="head_dropdown_item-title"><i
                    class="fa-light fa-message-exclamation"></i>Send Feedback</span></a>
            </div>
          </div>
          <div class="head_right_login"><a href="/blogadmin" class="head_right_login-btn"><i
                class="h h-user"></i><span>Sign in</span></a></div>
        </div>
      </div>
    </header>
    <div class="main-content">
      <div class="main-top">
        <h1>Love to hear from you,<br>Get in touch <span class="emoji">&#128075;</span></h1>
      </div>
      <div class="main-center">
        <form action="https://formsubmit.co/imankitkalirawana@gmail.com" method="POST" class="form">
          <div class="form-pre">
            <div class="input">
              <div class="input-heading">Your name</div>
              <input type="text" name="name" placeholder="John Doe">
            </div>

            <div class="input">
              <div class="input-heading">Your mail</div>
              <input type="email" name="email" placeholder="johndoe@gmail.com">
            </div>
          </div>
          <div class="form-pre">
            <div class="input">
              <div class="input-heading">Query type</div>
              <select class="select" name="query" id="selection">
                <option value="Contact">Contact</option>
                <option value="Report">Report</option>
                <option value="Feedback">Feedback</option>
              </select>
            </div>
          </div>
          <div class="input sfile">
            <input type="file" id="actual-btn" name="attachment" accept="image/png, image/jpeg" hidden />
            <label class="file-label" for="actual-btn">Choose a file </label>
            <span id="file-chosen">No file chosen</span>
          </div>
          <div class="input">
            <div class="input-heading">Subject</div>
            <input type="text" name="_subject" placeholder="Request for assistance">
          </div>
          <div class="message" id="message">
            <div class="input-heading">Message</div>
            <textarea name="message" id="message" placeholder="Let us know about you query..." rows="10"></textarea>
          </div>
          <div class="main-bottom">
            <button type="submit" class="submit">Just Send <i class="fa-solid fa-arrow-right"></i></button>
          </div>
          <input type="hidden" name="_next" value="#">
          <!-- <input type="hidden" name="_captcha" value="false"> -->
          <input type="hidden" name="_autoresponse" value="Thank you for submission imankitkalirawana team will reach you soon... Stay updated !">
          <input type="hidden" name="_template" value="box">
        </form>
      </div>
    </div>
  </div>
  <script src="/js/header.js"></script>
  <script>
    $(document).ready(function () {
      $('#selection').change(function () {
        if ($(this).val() == 'Contact') {
          $('.sfile').hide();
        } else {
          $('.sfile').show();
        }
      });
    });

    // File Choosen dialog

    const actualBtn = document.getElementById('actual-btn');
    const fileChosen = document.getElementById('file-chosen');
    actualBtn.addEventListener('change', function () {
      fileChosen.textContent = this.files[0].name
    })
  </script>
